<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ควบคุม LED ผ่าน Firebase</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
  <h2>🔥 ควบคุมหลอดไฟ LED</h2>
  <button onclick="turnOn()">เปิด LED</button>
  <button onclick="turnOff()">ปิด LED</button>
  <p>สถานะ: <span id="ledStatus">--</span></p>

  <script>
    // ตั้งค่า Firebase
    const firebaseConfig = {
  apiKey: "AIzaSyDRY4j_dl_0XHklG4t0rU8ceHgBj5xTeHc",
  authDomain: "ledcontrol-929b9.firebaseapp.com",
  databaseURL: "https://ledcontrol-929b9-default-rtdb.firebaseio.com",
  projectId: "ledcontrol-929b9",
  storageBucket: "ledcontrol-929b9.firebasestorage.app",
  messagingSenderId: "913743991583",
  appId: "1:913743991583:web:e4bd57021410adbaecd62a",
  measurementId: "G-011VLSN1T5"
    };

    // เริ่มต้น Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function turnOn() {
      db.ref("led").set("on");
    }

    function turnOff() {
      db.ref("led").set("off");
    }

    // อัปเดตสถานะแบบ real-time
    db.ref("led").on("value", (snapshot) => {
      document.getElementById("ledStatus").innerText = snapshot.val();
    });
  </script>
</body>
</html>
